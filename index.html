 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>باتمانتي ساره ☄️</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: 'Tajawal', sans-serif;
      overflow: hidden;
    }

    /* Full background image */
    .bg {
      position: fixed;
      inset: 0;
      background: url('13339.jpg') center center / cover no-repeat;
      z-index: 0;
    }
    /* subtle dark vignette so button pops */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 100%);
    }

    /* Center content */
    .scene {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      /* push button down to roughly where the bat-signal is */
      margin-top: 52vh;
    }

    /* ─── BUTTON ─── */
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap');

    .btn-batman {
      background: linear-gradient(135deg, #FFD700cc, #b8960ccc);
      color: #0a0a0a;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      padding: 16px 56px;
      border: 2px solid #FFD700;
      border-radius: 4px;
      cursor: pointer;
      clip-path: polygon(14px 0%, 100% 0%, calc(100% - 14px) 100%, 0% 100%);
      box-shadow: 0 0 40px #FFD700bb, 0 0 80px #FFD70055, 0 6px 30px #0009;
      transition: transform 0.15s, box-shadow 0.15s;
      backdrop-filter: blur(2px);
      animation: glow-pulse 2.5s ease-in-out infinite;
    }
    .btn-batman:hover {
      transform: scale(1.08);
      box-shadow: 0 0 60px #FFD700, 0 0 120px #FFD70077, 0 8px 40px #000a;
    }
    .btn-batman:active { transform: scale(0.96); }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 30px #FFD700aa, 0 0 60px #FFD70033, 0 6px 30px #0009; }
      50%       { box-shadow: 0 0 55px #FFD700,   0 0 110px #FFD70066, 0 6px 30px #0009; }
    }

    /* ─── OVERLAY VIDEO ─── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000000ee;
      z-index: 100;
      align-items: center;
      justify-content: center;
      animation: fade-in 0.35s ease;
    }
    .overlay.active { display: flex; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    .video-box {
      position: relative;
      border: 2px solid #FFD700;
      border-radius: 10px;
      box-shadow: 0 0 60px #FFD700aa;
      overflow: hidden;
      max-width: 92vw;
    }
    .video-box video {
      display: block;
      max-width: 92vw;
      max-height: 80vh;
    }
    .close-btn {
      position: absolute;
      top: 10px; left: 10px;
      background: #FFD700;
      color: #000;
      border: none;
      border-radius: 50%;
      width: 34px; height: 34px;
      font-size: 1.1rem;
      font-weight: 900;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .close-btn:hover { background: #fff; }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="scene">
  <button class="btn-batman" id="playBtn">🦇 باتمانتي ساره ☄️</button>
</div>

<!-- Video Overlay -->
<div class="overlay" id="overlay">
  <div class="video-box">
    <button class="close-btn" id="closeBtn">✕</button>
    <video id="myVideo" controls playsinline>
      <source src="mp4.1234" type="video/mp4" />
    </video>
  </div>
</div>

<script>
  const overlay  = document.getElementById('overlay');
  const video    = document.getElementById('myVideo');
  const playBtn  = document.getElementById('playBtn');
  const closeBtn = document.getElementById('closeBtn');
 playBtn.addEventListener('click', () => {
    overlay.classList.add('active');
    video.currentTime = 0;
    video.play();
  });

  closeBtn.addEventListener('click', () => {
    overlay.classList.remove('active');
    video.pause();
  });

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) {
      overlay.classList.remove('active');
      video.pause();
    }
  });
</script>
</body>
</html>
